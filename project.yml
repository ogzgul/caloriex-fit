name: KaloriHesap
options:
  bundleIdPrefix: com.oguzgul
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  developmentLanguage: tr
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  KaloriHesap:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KaloriHesap
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ogzgul.caloriex
        INFOPLIST_FILE: KaloriHesap/Resources/Info.plist
        DEVELOPMENT_TEAM: "5PY8Q784PU"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only (2 ekleyince iPad de olur)
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: KaloriHesap/Resources/KaloriHesap.entitlements
